<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Test Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #222;
      font-size: 14px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header span.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }

    .message.user .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      padding: 12px 16px;
      border-radius: 12px;
      display: inline-block;
      max-width: 80%;
      float: right;
      clear: both;
    }

    .message.assistant .bubble {
      white-space: pre-wrap;
      line-height: 1.65;
    }

    .message.assistant .bubble::after {
      content: "▋";
      animation: blink 1s step-start infinite;
      display: none;
    }

    .message.assistant.streaming .bubble::after {
      display: inline;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .label {
      font-size: 11px;
      color: #555;
      margin-bottom: 6px;
    }

    #input-area {
      padding: 16px 20px;
      border-top: 1px solid #222;
    }

    #input-row {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e5e5e5;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #555; }
    textarea::placeholder { color: #444; }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    .error { color: #f87171; font-size: 13px; margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    StreamingFunction — SAM local
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea
        id="prompt"
        rows="1"
        placeholder="Send a message…"
        autofocus
      ></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(role, text = "") {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = role === "user" ? "You" : "Assistant";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { wrapper, bubble };
    }

    async function send() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;

      promptEl.value = "";
      promptEl.style.height = "auto";
      sendBtn.disabled = true;

      addMessage("user", prompt);

      const { wrapper, bubble } = addMessage("assistant");
      wrapper.classList.add("streaming");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });

        if (!res.ok) {
          bubble.textContent = `Error ${res.status}: ${await res.text()}`;
          bubble.classList.add("error");
        } else {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });

            // Parse SSE lines: "data: <json-encoded-token>\n\n"
            const lines = buffer.split("\n");
            buffer = lines.pop(); // keep incomplete last line

            for (const line of lines) {
              if (!line.startsWith("data:")) continue;
              const raw = line.slice(5).trim();
              if (!raw) continue;
              try {
                bubble.textContent += JSON.parse(raw);
              } catch {
                bubble.textContent += raw;
              }
            }

            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        }
      } catch (err) {
        bubble.textContent = `Error: ${err.message}`;
        bubble.classList.add("error");
      } finally {
        wrapper.classList.remove("streaming");
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);

    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    promptEl.addEventListener("input", () => {
      promptEl.style.height = "auto";
      promptEl.style.height = promptEl.scrollHeight + "px";
    });
  </script>
</body>
</html>
